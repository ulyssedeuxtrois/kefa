<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    position: relative;
  }

  /* Barre de progression en haut */
  .progress-bar {
    position: absolute;
    top: 40px;
    left: 48px;
    right: 48px;
    height: 6px;
    background: linear-gradient(to right, #ff5a36, #ff7040);
    border-radius: 3px;
  }

  .content {
    position: absolute;
    inset: 0;
    padding: 100px 72px 80px;
    display: flex;
    flex-direction: column;
  }

  /* ── LOGO ── */
  .logo {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: auto;
  }

  .logo-icon { width: 80px; height: 80px; }

  .logo-text {
    font-size: 44px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
  }

  .logo-text .q { color: #ff5a36; }

  /* ── HEADLINE ── */
  .headline {
    font-size: 110px;
    font-weight: 900;
    color: white;
    line-height: 1;
    letter-spacing: -3px;
    margin: 80px 0 24px;
  }

  .headline .accent { color: #ff5a36; }

  .subline {
    font-size: 36px;
    color: #64748b;
    margin-bottom: 64px;
    font-weight: 500;
  }

  /* ── EVENTS ── */
  .events { display: flex; flex-direction: column; gap: 20px; flex: 1; }

  .event {
    background: #1e293b;
    border-radius: 24px;
    padding: 36px 40px;
    display: flex;
    align-items: center;
    gap: 28px;
    border: 1.5px solid #334155;
  }

  .event-icon { font-size: 40px; flex-shrink: 0; }

  .event-info { flex: 1; min-width: 0; }

  .event-name {
    font-size: 30px;
    font-weight: 800;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-meta {
    font-size: 24px;
    color: #64748b;
    margin-top: 6px;
  }

  .event-price {
    font-size: 26px;
    font-weight: 800;
    color: #ff5a36;
    flex-shrink: 0;
  }

  /* ── CTA ── */
  .cta {
    background: #ff5a36;
    color: white;
    font-size: 34px;
    font-weight: 800;
    text-align: center;
    padding: 40px;
    border-radius: 24px;
    margin-top: 40px;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>

<div class="progress-bar"></div>

<div class="content">
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 100 118" xmlns="http://www.w3.org/2000/svg">
      <rect x="5" y="5" width="90" height="90" rx="16" fill="#ff5a36"/>
      <polygon points="8,93 2,116 34,93" fill="#ff5a36"/>
      <text x="50" y="70" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="62" font-weight="900" fill="white">?</text>
    </svg>
    <div class="logo-text">kefa<span class="q">?</span></div>
  </div>

  <div>
    <div class="headline">Ce soir<br>à <span class="accent" id="city">Nice</span></div>
    <div class="subline" id="date-label">Côte d'Azur · Aujourd'hui</div>
  </div>

  <div class="events" id="events-list"></div>

  <div class="cta">Voir tous les events → kefa.fr</div>
</div>

<script>
  const events = JSON.parse('__EVENTS_JSON__');
  const dateLabel = '__DATE_LABEL__';

  document.getElementById('date-label').textContent = 'Côte d\'Azur · ' + dateLabel;

  const icons = {
    'musique': '🎵', 'concert': '🎵',
    'art': '🎨', 'expo': '🎨',
    'sport': '⚽', 'balade': '🥾',
    'theatre': '🎭', 'spectacle': '🎭',
    'degustation': '🍷', 'marche': '🛍️',
    'jeux': '🎮', 'enfants': '🎈',
    'default': '📅'
  };

  function getIcon(slug) { return icons[slug] || icons.default; }
  function formatPrice(ev) { return ev.isFree ? 'Gratuit' : (ev.price ? ev.price + '€' : ''); }
  function formatTime(dateStr) {
    return new Date(dateStr).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  const container = document.getElementById('events-list');
  events.slice(0, 4).forEach(ev => {
    const icon = getIcon(ev.category?.slug);
    const price = formatPrice(ev);
    const time = formatTime(ev.date);

    container.innerHTML += `
      <div class="event">
        <span class="event-icon">${icon}</span>
        <div class="event-info">
          <div class="event-name">${ev.title}</div>
          <div class="event-meta">${time} · ${ev.city || 'Nice'}</div>
        </div>
        <div class="event-price">${price}</div>
      </div>
    `;
  });
</script>
</body>
</html>
